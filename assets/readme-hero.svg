    <rect x="424" y="410" width="176" height="42" rx="21" fill="#0B1623" stroke="#203244"/>
    <text x="512" y="432" fill="#D7E0EA" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="middle">TypeScript</text>
