    <text x="844" y="432" fill="#D7E0EA" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" text-anchor="middle" dominant-baseline="middle">C# /.NET</text>

    <rect x="768" y="146" width="250" height="248" rx="22" fill="#0B1623" stroke="#1E3345"/>
    <rect x="794" y="180" width="16" height="16" rx="8" fill="#FF6B6B"/>
