      <stop offset="1" stop-color="#04070C"/>
    </linearGradient>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1030 130) rotate(137.11) scale(304.514 221.981)">
      <stop stop-color="#4AEDC4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#4AEDC4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(260 508) rotate(16.4) scale(341.742 204.087)">
      <stop stop-color="#2DD4BF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="262" y1="88" x2="1024" y2="552" gradientUnits="userSpaceOnUse">
